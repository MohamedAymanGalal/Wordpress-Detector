<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WP Inspector</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root[data-theme="dark"] {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --input-bg: #0f172a;
            --text: #e2e8f0;
            --text-bright: #f8fafc;
            --text-muted: #94a3b8;
            --text-dim: #64748b;
            --text-sub: #cbd5e1;
            --border: #334155;
            --shadow: rgba(0, 0, 0, 0.4);
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --btn-secondary-bg: #334155;
            --btn-secondary-hover: #475569;
            --result-details-bg: #1a2536;
        }

        :root[data-theme="light"] {
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --input-bg: #f8fafc;
            --text: #334155;
            --text-bright: #0f172a;
            --text-muted: #64748b;
            --text-dim: #94a3b8;
            --text-sub: #475569;
            --border: #e2e8f0;
            --shadow: rgba(0, 0, 0, 0.1);
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --btn-secondary-bg: #e2e8f0;
            --btn-secondary-hover: #cbd5e1;
            --result-details-bg: #f8fafc;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s, color 0.3s;
        }

        .container {
            width: 100%;
            max-width: 700px;
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 40px 32px;
            box-shadow: 0 25px 50px var(--shadow);
            transition: background 0.3s;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            position: relative;
        }

        h1 {
            text-align: center;
            font-size: 28px;
            color: var(--text-bright);
        }

        .theme-toggle {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            background: var(--btn-secondary-bg);
            border: none;
            border-radius: 8px;
            padding: 8px;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 18px;
            line-height: 1;
            transition: background 0.2s;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-toggle:hover { background: var(--btn-secondary-hover); }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 24px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 24px;
            background: var(--bg);
            border-radius: 10px;
            padding: 4px;
        }

        .tab {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab.active {
            background: var(--accent);
            color: white;
        }

        .tab:not(.active):hover {
            color: var(--text);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Input styles */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        @media (max-width: 500px) {
            .input-group input[type="text"] { width: 100%; }
            .input-group button { width: 100%; }
        }

        input[type="text"] {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid var(--border);
            border-radius: 10px;
            background: var(--input-bg);
            color: var(--text-bright);
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s, background 0.3s, color 0.3s;
        }

        input[type="text"]:focus { border-color: var(--accent); }

        textarea {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid var(--border);
            border-radius: 10px;
            background: var(--input-bg);
            color: var(--text-bright);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            resize: vertical;
            min-height: 120px;
            margin-bottom: 12px;
            transition: border-color 0.2s, background 0.3s, color 0.3s;
        }

        textarea:focus { border-color: var(--accent); }

        button {
            padding: 14px 28px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        button:hover { background: var(--accent-hover); }
        button:disabled {
            background: var(--border);
            cursor: not-allowed;
        }

        .bulk-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        .bulk-actions button { flex: 1; }

        .btn-secondary {
            background: var(--btn-secondary-bg);
            color: var(--text);
        }

        .btn-secondary:hover { background: var(--btn-secondary-hover); }

        /* Loading */
        .loading {
            display: none;
            text-align: center;
            padding: 40px 0;
        }

        .loading.active { display: block; }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* Results */
        .results { display: none; }
        .results.active { display: block; }

        .verdict {
            text-align: center;
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .verdict.is-wp {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .verdict.not-wp {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .verdict-label {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        .verdict-text {
            font-size: 24px;
            font-weight: 700;
        }

        .verdict.is-wp .verdict-text { color: #22c55e; }
        .verdict.not-wp .verdict-text { color: #ef4444; }

        .confidence {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 6px;
        }

        /* Details */
        .details-section { margin-bottom: 16px; }

        .details-title {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border);
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            font-size: 14px;
        }

        .detail-row .label { color: var(--text-sub); }
        .detail-row .value { color: var(--text-bright); font-weight: 500; }


        .plugins-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 4px;
        }

        .plugin-tag {
            background: var(--btn-secondary-bg);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            color: var(--text-sub);
        }

        .error-msg {
            display: none;
            text-align: center;
            padding: 20px;
            color: #f87171;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 12px;
            border: 1px solid rgba(239, 68, 68, 0.2);
            font-size: 14px;
        }

        .error-msg.active { display: block; }

        /* Bulk results */
        .bulk-progress {
            display: none;
            margin-bottom: 20px;
        }

        .bulk-progress.active { display: block; }

        .progress-bar-container {
            background: var(--bg);
            border-radius: 8px;
            height: 8px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-bar {
            height: 100%;
            background: var(--accent);
            border-radius: 8px;
            transition: width 0.3s;
            width: 0%;
        }

        .progress-text {
            font-size: 13px;
            color: var(--text-muted);
            text-align: center;
        }

        .bulk-results { margin-top: 16px; }

        .bulk-result-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: var(--bg);
            border-radius: 10px;
            margin-bottom: 8px;
            gap: 12px;
        }

        .bulk-result-url {
            font-size: 14px;
            color: var(--text-sub);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
            min-width: 0;
        }

        .bulk-result-info {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .bulk-result-version {
            font-size: 12px;
            color: var(--text-muted);
        }

        .bulk-badge {
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
        }

        .bulk-badge.wp {
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
        }

        .bulk-badge.not-wp {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }

        .bulk-badge.error {
            background: rgba(234, 179, 8, 0.15);
            color: #eab308;
        }

        .bulk-summary {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .bulk-summary-item {
            text-align: center;
            padding: 12px 20px;
            background: var(--bg);
            border-radius: 10px;
            cursor: pointer;
            transition: outline 0.2s, transform 0.15s;
        }

        .bulk-summary-item:hover { transform: scale(1.05); }
        .bulk-summary-item.selected { outline: 2px solid var(--text-bright); }

        .bulk-summary-count {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-bright);
        }

        .bulk-summary-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .bulk-summary-item.wp .bulk-summary-count { color: #22c55e; }
        .bulk-summary-item.not-wp .bulk-summary-count { color: #ef4444; }
        .bulk-summary-item.err .bulk-summary-count { color: #eab308; }

        .bulk-detail-toggle {
            background: none;
            border: none;
            color: var(--accent);
            cursor: pointer;
            font-size: 12px;
            padding: 4px 8px;
        }

        .bulk-detail-toggle:hover { text-decoration: underline; }

        .bulk-result-details {
            display: none;
            padding: 12px 16px;
            background: var(--result-details-bg);
            border-radius: 0 0 10px 10px;
            margin-top: -8px;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .bulk-result-details.active { display: block; }

        .bulk-detail-row {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            color: var(--text-muted);
        }

        .bulk-detail-row .val { color: var(--text-sub); }

        .bulk-actions-row {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .action-btn {
            background: var(--btn-secondary-bg);
            font-size: 13px;
            padding: 10px 20px;
            color: var(--text);
        }

        .action-btn:hover { background: var(--btn-secondary-hover); }

        .action-btn.retry-btn {
            background: rgba(234, 179, 8, 0.15);
            color: #eab308;
        }

        .action-btn.retry-btn:hover { background: rgba(234, 179, 8, 0.25); }

        /* Sub-tabs */
        .sub-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
            background: var(--bg);
            border-radius: 8px;
            padding: 3px;
        }

        .sub-tab {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            background: transparent;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .sub-tab.active {
            background: var(--btn-secondary-bg);
            color: var(--text-bright);
        }

        .sub-tab:not(.active):hover { color: var(--text); }

        .sub-tab-content { display: none; }
        .sub-tab-content.active { display: block; }

        /* Upload area */
        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 10px;
            padding: 32px 20px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            margin-bottom: 12px;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--accent);
            background: rgba(59, 130, 246, 0.05);
        }

        .upload-icon { font-size: 32px; margin-bottom: 8px; }
        .upload-text { font-size: 14px; color: var(--text-sub); margin-bottom: 4px; }
        .upload-hint { font-size: 12px; color: var(--text-dim); }

        .file-info {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: var(--bg);
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 13px;
            color: var(--text-sub);
        }

        .file-info #fileName {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .file-info #fileUrlCount { color: var(--text-muted); white-space: nowrap; }

        /* History */
        /* SSL */
        .ssl-status { font-weight: 600; font-size: 13px; }
        .ssl-status.valid { color: #22c55e; }
        .ssl-status.expiring { color: #eab308; }
        .ssl-status.expired { color: #ef4444; }

        .history-section { margin-top: 20px; }

        .history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            background: var(--bg);
            border-radius: 8px;
            margin-bottom: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .history-item:hover { background: var(--btn-secondary-bg); }

        .history-url {
            color: var(--text-sub);
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            min-width: 0;
        }

        .history-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .history-time {
            color: var(--text-dim);
            font-size: 11px;
        }

        .history-badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        .history-badge.wp { background: rgba(34, 197, 94, 0.15); color: #22c55e; }
        .history-badge.not-wp { background: rgba(239, 68, 68, 0.15); color: #ef4444; }

        .history-clear {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 12px;
            padding: 4px 8px;
        }

        .history-clear:hover { color: #ef4444; }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .history-empty {
            text-align: center;
            color: var(--text-dim);
            font-size: 13px;
            padding: 16px;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--text-bright);
            color: var(--bg);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            opacity: 0;
            transition: transform 0.3s, opacity 0.3s;
            z-index: 1000;
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* URL validation warning */
        .url-warning {
            display: none;
            font-size: 12px;
            color: #eab308;
            margin-top: -18px;
            margin-bottom: 12px;
            padding: 0 4px;
        }
        .url-warning.active { display: block; }


        /* Share button */
        .share-btn {
            display: none;
            margin: 12px auto 0;
            background: var(--btn-secondary-bg);
            color: var(--text);
            font-size: 13px;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }
        .share-btn:hover { background: var(--btn-secondary-hover); }
        .share-btn.active { display: block; }

        /* Accordion */
        .accordion {
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 10px;
            overflow: hidden;
            transition: border-color 0.2s;
        }
        .accordion-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            background: var(--bg);
            cursor: pointer;
            user-select: none;
            transition: background 0.15s;
        }
        .accordion-header:hover { background: var(--btn-secondary-bg); }
        .accordion-header-left {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-bright);
        }
        .accordion-badge {
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 4px;
        }
        .accordion-badge.green { background: rgba(34, 197, 94, 0.15); color: #22c55e; }
        .accordion-badge.yellow { background: rgba(234, 179, 8, 0.15); color: #eab308; }
        .accordion-badge.red { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
        .accordion-badge.blue { background: rgba(59, 130, 246, 0.15); color: #3b82f6; }
        .accordion-arrow {
            font-size: 12px;
            color: var(--text-dim);
            transition: transform 0.2s;
            flex-shrink: 0;
        }
        .accordion.open .accordion-arrow { transform: rotate(180deg); }
        .accordion-body {
            display: none;
            padding: 0 16px 16px;
            background: var(--bg);
        }
        .accordion.open .accordion-body { display: block; }

        /* PageSpeed Insights */
        .psi-gauges {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 14px;
        }
        .psi-gauge-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            min-width: 70px;
        }
        .psi-gauge {
            position: relative;
            width: 56px;
            height: 56px;
        }
        .psi-gauge svg { transform: rotate(-90deg); }
        .psi-gauge-bg { fill: none; stroke: var(--border); stroke-width: 5; }
        .psi-gauge-fill { fill: none; stroke-width: 5; stroke-linecap: round; transition: stroke-dashoffset 0.6s ease; }
        .psi-gauge-text {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 700;
        }
        .psi-gauge-label {
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.2;
        }
        .psi-metric-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 0;
            font-size: 13px;
        }
        .psi-metric-label { color: var(--text-sub); }
        .psi-metric-value { font-weight: 500; }

        /* Security Score */
        .security-score-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .security-gauge {
            position: relative;
            width: 56px;
            height: 56px;
            flex-shrink: 0;
        }
        .security-gauge svg { transform: rotate(-90deg); }
        .security-gauge-bg { fill: none; stroke: var(--border); stroke-width: 5; }
        .security-gauge-fill { fill: none; stroke-width: 5; stroke-linecap: round; transition: stroke-dashoffset 0.6s ease, stroke 0.3s; }
        .security-gauge-text {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 700;
        }
        .security-finding {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 0;
            font-size: 13px;
        }
        .security-finding .sf-icon {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            flex-shrink: 0;
        }
        .sf-icon.good { background: rgba(34, 197, 94, 0.15); color: #22c55e; }
        .sf-icon.warn { background: rgba(234, 179, 8, 0.15); color: #eab308; }
        .sf-icon.bad { background: rgba(239, 68, 68, 0.15); color: #ef4444; }

        /* Suggestions */
        .suggestions-toggle {
            width: 100%;
            margin-top: 12px;
            padding: 10px 16px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.25);
            border-radius: 8px;
            color: var(--accent);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .suggestions-toggle:hover { background: rgba(59, 130, 246, 0.18); }
        .suggestions-toggle.open { border-radius: 8px 8px 0 0; margin-bottom: 0; }
        .suggestions-container {
            display: none;

</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>WP Inspector</h1>
                <button class="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode">
                    <span id="themeIcon">&#9788;</span>

            <p class="subtitle">Detect WordPress, inspect themes, plugins & SSL</p>

            <div class="tabs">

                <div class="error-msg" id="errorMsg"></div>

                <div class="loading" id="loading">

                <div class="results" id="results">
                    <div class="verdict" id="verdict">
                        <div class="verdict-label">Result</div>
                        <div class="verdict-text" id="verdictText"></div>
                        <div class="confidence" id="confidenceText"></div>
                    </div>

                    <!-- General Overview Accordion -->
                    <div class="accordion open" id="accordionOverview" style="display:none">
                        <div class="accordion-header" onclick="toggleAccordion('accordionOverview')">
                            <div class="accordion-header-left">

                                <span class="accordion-badge blue" id="overviewBadge"></span>
                            </div>
                            <span class="accordion-arrow">&#9660;</span>
                        </div>
                        <div class="accordion-body">
                            <div id="infoRows"></div>
                            <div id="pluginsSection" style="display:none;margin-top:12px">
                                <div class="details-title">Detected Plugins</div>
                                <div class="plugins-list" id="pluginsList"></div>
                            </div>
                        </div>
                    </div>

                    <!-- SSL / Domain Accordion -->
                    <div class="accordion" id="accordionSsl" style="display:none">
                        <div class="accordion-header" onclick="toggleAccordion('accordionSsl')">
                            <div class="accordion-header-left">
                                <span>SSL / Domain</span>
                                <span class="accordion-badge" id="sslBadge"></span>
                            </div>
                            <span class="accordion-arrow">&#9660;</span>
                        </div>
                        <div class="accordion-body">
                            <div id="sslRows"></div>
                        </div>
                    </div>

                    <!-- PageSpeed Insights Accordion -->
                    <div class="accordion" id="accordionPagespeed" style="display:none">
                        <div class="accordion-header" onclick="toggleAccordion('accordionPagespeed')">
                            <div class="accordion-header-left">
                                <span>PageSpeed Insights</span>
                                <span class="accordion-badge" id="psiBadge"></span>
                            </div>
                            <span class="accordion-arrow">&#9660;</span>
                        </div>
                        <div class="accordion-body">
                            <div id="pagespeedLoading" style="display:none;text-align:center;padding:12px 0;font-size:13px;color:var(--text-muted)">
                                <div class="spinner" style="width:24px;height:24px;border-width:3px;margin-bottom:8px"></div>
                                Analyzing page performance...
                            </div>
                            <div id="pagespeedScores" style="display:none">
                                <div class="psi-gauges" id="psiGauges"></div>
                                <div id="psiMetrics"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Security Score Accordion -->
                    <div class="accordion" id="accordionSecurity" style="display:none">
                        <div class="accordion-header" onclick="toggleAccordion('accordionSecurity')">
                            <div class="accordion-header-left">
                                <span>Security Score</span>
                                <span class="accordion-badge" id="securityBadge"></span>
                            </div>
                            <span class="accordion-arrow">&#9660;</span>
                        </div>
                        <div class="accordion-body">
                            <div class="security-score-header">
                                <div></div>
                                <div class="security-gauge" id="securityGauge"></div>
                            </div>
                            <div id="securityFindings"></div>
                            <button class="suggestions-toggle" id="suggestionsToggle" onclick="toggleSuggestions()" style="display:none">How to Improve Your Score</button>

                    </div>

                    <button class="share-btn" id="shareBtn" onclick="shareResults()">Share Results</button>
                </div>
            </div>

            <!-- Bulk Check Tab -->
            <div class="tab-content" id="tab-bulk">
                <div class="sub-tabs">
                    <button class="sub-tab active" onclick="switchSubTab('type')">Type URLs</button>
                    <button class="sub-tab" onclick="switchSubTab('upload')">Upload File</button>
                </div>

                <div class="sub-tab-content active" id="subtab-type">
                    <textarea id="bulkInput" placeholder="Enter one URL per line, e.g.&#10;example.com&#10;another-site.org&#10;mysite.net"></textarea>
                </div>

                <div class="sub-tab-content" id="subtab-upload">
                    <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
                        <div class="upload-icon">&#128196;</div>
                        <div class="upload-text">Click to upload or drag & drop</div>
                        <div class="upload-hint">CSV or Excel (.csv, .xlsx, .xls)</div>
                        <input type="file" id="fileInput" accept=".csv,.xlsx,.xls" style="display:none" onchange="handleFileUpload(event)" />
                    </div>
                    <div class="file-info" id="fileInfo" style="display:none">
                        <span id="fileName"></span>
                        <span id="fileUrlCount"></span>
                        <button class="btn-secondary" style="padding:6px 14px;font-size:12px" onclick="clearFile()">Remove</button>
                    </div>
                </div>

                <div class="bulk-actions">
                    <button id="bulkScanBtn" onclick="bulkScan()">Scan All</button>
                    <button class="btn-secondary" onclick="clearBulk()">Clear</button>
                </div>

                <div class="error-msg" id="bulkErrorMsg"></div>

                <div class="bulk-progress" id="bulkProgress">
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="progressBar"></div>
                    </div>
                    <div class="progress-text" id="progressText">0 / 0</div>
                </div>

                <div id="bulkResultsContainer" style="display:none">
                    <div class="bulk-summary" id="bulkSummary"></div>
                    <div class="bulk-actions-row" id="bulkActionsRow">
                        <button class="action-btn" onclick="exportCSV()">Export CSV</button>
                        <button class="action-btn" onclick="copyResults()">Copy Results</button>
                        <button class="action-btn retry-btn" id="retryErrorsBtn" onclick="retryErrors()" style="display:none">Retry Errors</button>
                    </div>
                    <div class="bulk-results" id="bulkResults"></div>
