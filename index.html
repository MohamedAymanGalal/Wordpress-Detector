            </div>

            <!-- History Tab -->
            <div class="tab-content" id="tab-history">
                <div class="history-header">
                    <div class="details-title" style="border:none;margin:0;padding:0">Scan History</div>
                    <button class="history-clear" onclick="clearHistory()">Clear All</button>
                </div>
                <div id="historyList"></div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const PROXIES = [
            { url: 'https://api.allorigins.win/raw?url=', encode: true },
            { url: 'https://api.codetabs.com/v1/proxy/?quest=', encode: false }
        ];

        // --- Theme toggle ---
        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('wp-detector-theme', next);
            updateThemeIcon(next);
        }

        function updateThemeIcon(theme) {
            document.getElementById('themeIcon').innerHTML = theme === 'dark' ? '&#9788;' : '&#9790;';
        }

        // Load saved theme
        (function() {
            const saved = localStorage.getItem('wp-detector-theme');
            if (saved) {
                document.documentElement.setAttribute('data-theme', saved);
                updateThemeIcon(saved);
            }
        })();

        // --- Toast ---
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // --- Tab switching ---
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelector(`.tab-content#tab-${tab}`).classList.add('active');
            const tabs = document.querySelectorAll('.tab');
            const idx = tab === 'single' ? 0 : tab === 'bulk' ? 1 : 2;
            tabs[idx].classList.add('active');
            if (tab === 'history') renderHistory();
        }

        function switchSubTab(tab) {
            document.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.sub-tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('subtab-' + tab).classList.add('active');
            document.querySelectorAll('.sub-tab')[tab === 'type' ? 0 : 1].classList.add('active');
        }

        // --- File upload ---
        let uploadedUrls = [];

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            processFile(file);
        }

        function processFile(file) {
            const name = file.name.toLowerCase();

            if (name.endsWith('.csv')) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const urls = parseCSVForUrls(e.target.result);
                    setUploadedUrls(urls, file.name);
                };
                reader.readAsText(file);
            } else if (name.endsWith('.xlsx') || name.endsWith('.xls')) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const urls = parseExcelForUrls(new Uint8Array(e.target.result));
                    setUploadedUrls(urls, file.name);
                };
                reader.readAsArrayBuffer(file);
            }
        }

        function parseCSVForUrls(text) {
            const urls = [];
            const lines = text.split(/\r?\n/);
            for (const line of lines) {
                const cells = line.split(/[,;\t]/);
                for (const cell of cells) {
                    const cleaned = cell.trim().replace(/^["']|["']$/g, '');
                    if (looksLikeUrl(cleaned)) urls.push(cleaned);
                }
            }
            return urls;
        }

        function parseExcelForUrls(data) {
            const urls = [];
            try {
                const text = new TextDecoder('utf-8', { fatal: false }).decode(data);
                const matches = text.matchAll(/(?:https?:\/\/)?(?:www\.)?([a-z0-9]([a-z0-9-]*[a-z0-9])?\.)+[a-z]{2,}[^\s<>"',;)}\]]*?(?=[<"'\s,;)}\]]|$)/gi);
                for (const m of matches) {
                    const cleaned = m[0].trim();
                    if (looksLikeUrl(cleaned) && !cleaned.includes('schemas.openxmlformats') && !cleaned.includes('schemas.microsoft')) {
                        urls.push(cleaned);
                    }
                }
            } catch { /* ignore */ }
            return [...new Set(urls)];
        }

        function looksLikeUrl(str) {
            if (!str || str.length < 4) return false;
            return /^(https?:\/\/)?([a-z0-9]([a-z0-9-]*[a-z0-9])?\.)+[a-z]{2,}/i.test(str);
        }

        function setUploadedUrls(urls, fileName) {
            uploadedUrls = urls;
            if (urls.length > 0) {
                document.getElementById('fileInfo').style.display = 'flex';
                document.getElementById('uploadArea').style.display = 'none';
                document.getElementById('fileName').textContent = fileName;
                document.getElementById('fileUrlCount').textContent = urls.length + ' URL' + (urls.length !== 1 ? 's' : '');
            } else {
                showError('bulkErrorMsg', 'No URLs found in the file.');
                clearFile();
            }
        }

        function clearFile() {
            uploadedUrls = [];
            document.getElementById('fileInput').value = '';
            document.getElementById('fileInfo').style.display = 'none';
            document.getElementById('uploadArea').style.display = 'block';
        }

        // Drag & drop
        const uploadArea = document.getElementById('uploadArea');
        uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('dragover'); });
        uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length) processFile(e.dataTransfer.files[0]);
        });

        // --- Shared utilities ---
        function normalizeUrl(input) {
            let url = input.trim();
            if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
            return new URL(url);
        }

        let fetchTimeout = 15000;

        async function proxyFetch(url) {
            // Race all proxies simultaneously — first successful response wins
            const controllers = [];
            const promises = PROXIES.map((proxy, idx) => {
                const controller = new AbortController();
                controllers.push(controller);
                const proxyUrl = proxy.url + (proxy.encode ? encodeURIComponent(url) : url);
                return fetch(proxyUrl, { signal: controller.signal })
                    .then(resp => {
                        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                        // Cancel other proxies
                        controllers.forEach((c, i) => { if (i !== idx) c.abort(); });
                        return resp;
                    });
            });

            // Add a timeout promise
            const timeoutPromise = new Promise((_, reject) => {
                setTimeout(() => {
                    controllers.forEach(c => c.abort());
                    reject(new Error('Timeout'));
                }, fetchTimeout);
            });

            return Promise.any([...promises, timeoutPromise].map(p =>
                p instanceof Promise ? p : Promise.reject(p)
            )).catch(() => { throw new Error('All proxies failed'); });
        }

        async function fetchText(url) {
            const resp = await proxyFetch(url);
            return await resp.text();
        }

        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // --- SSL certificate check ---
        async function checkSSL(domain) {
            try {
                const sslUrl = `https://ssl-checker.io/api/v1/check/${domain}`;
                const resp = await proxyFetch(sslUrl);
                const data = JSON.parse(await resp.text());
                const r = data.result || data;
                return {
                    valid: !!r.cert_valid,
                    issuer: r.issuer_o || r.issuer_cn || 'Unknown',
                    validFrom: r.valid_from || null,
                    validTill: r.valid_till || null,
                    daysLeft: r.days_left != null ? r.days_left : null,
                    hsts: !!r.hsts_header_enabled
                };
            } catch {
                return null;
            }
        }

        // --- PageSpeed Insights ---
        const PSI_API_KEY = 'AIzaSyBEa44t8LE6HFv1r2tTe8MbpQ1NIbsSEVw';

        async function fetchPageSpeed(url) {
            try {
                const apiUrl = `https://www.googleapis.com/pagespeedonline/v5/runPagespeed?url=${encodeURIComponent(url)}&key=${PSI_API_KEY}&category=performance&category=accessibility&category=best-practices&category=seo`;
                const resp = await fetch(apiUrl);
                if (!resp.ok) throw new Error(`PSI API error ${resp.status}`);
                const data = await resp.json();
                const cats = data.lighthouseResult?.categories || {};
                const audits = data.lighthouseResult?.audits || {};
                return {
                    performance: cats.performance ? Math.round(cats.performance.score * 100) : null,
                    accessibility: cats.accessibility ? Math.round(cats.accessibility.score * 100) : null,
                    bestPractices: cats['best-practices'] ? Math.round(cats['best-practices'].score * 100) : null,
                    seo: cats.seo ? Math.round(cats.seo.score * 100) : null,
                    metrics: {
                        fcp: audits['first-contentful-paint']?.displayValue || null,
                        lcp: audits['largest-contentful-paint']?.displayValue || null,
                        tbt: audits['total-blocking-time']?.displayValue || null,
                        cls: audits['cumulative-layout-shift']?.displayValue || null,
                        si: audits['speed-index']?.displayValue || null,
                        tti: audits['interactive']?.displayValue || null,
                    }
                };
            } catch {
                return null;
            }
        }

        function renderPageSpeed(psi) {
            const accordion = document.getElementById('accordionPagespeed');
            const loadingEl = document.getElementById('pagespeedLoading');
            const scoresEl = document.getElementById('pagespeedScores');
            const gaugesEl = document.getElementById('psiGauges');
            const metricsEl = document.getElementById('psiMetrics');
            const psiBadge = document.getElementById('psiBadge');

            loadingEl.style.display = 'none';

            if (!psi) {
                scoresEl.style.display = 'none';
                accordion.style.display = 'none';
                return;
            }

            // Update badge with performance score
            if (psi.performance != null) {
                psiBadge.textContent = psi.performance + '/100';
                psiBadge.className = 'accordion-badge ' + (psi.performance >= 90 ? 'green' : psi.performance >= 50 ? 'yellow' : 'red');
            } else {
                psiBadge.textContent = '';
            }

            scoresEl.style.display = 'block';

            const categories = [
                { label: 'Performance', score: psi.performance },
                { label: 'Accessibility', score: psi.accessibility },
                { label: 'Best Practices', score: psi.bestPractices },
                { label: 'SEO', score: psi.seo }
            ];

            const circumference = 2 * Math.PI * 22;
            gaugesEl.innerHTML = categories.map(cat => {
                if (cat.score == null) return '';
                const color = cat.score >= 90 ? '#22c55e' : cat.score >= 50 ? '#eab308' : '#ef4444';
                const offset = circumference - (cat.score / 100) * circumference;
                return `<div class="psi-gauge-item">
                    <div class="psi-gauge">
                        <svg width="56" height="56" viewBox="0 0 56 56">
                            <circle class="psi-gauge-bg" cx="28" cy="28" r="22"/>
                            <circle class="psi-gauge-fill" cx="28" cy="28" r="22" stroke="${color}" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"/>
                        </svg>
                        <div class="psi-gauge-text" style="color:${color}">${cat.score}</div>
                    </div>
                    <div class="psi-gauge-label">${cat.label}</div>
                </div>`;
            }).join('');

            const metricLabels = {
                fcp: 'First Contentful Paint',
                lcp: 'Largest Contentful Paint',
                tbt: 'Total Blocking Time',
                cls: 'Cumulative Layout Shift',
                si: 'Speed Index',
                tti: 'Time to Interactive'
            };

            const metricRows = Object.entries(psi.metrics)
                .filter(([, v]) => v != null)
                .map(([key, val]) => `<div class="psi-metric-row"><span class="psi-metric-label">${metricLabels[key]}</span><span class="psi-metric-value">${val}</span></div>`)
                .join('');
            metricsEl.innerHTML = metricRows;
        }

        // --- Security score calculation ---
        function buildSecurityData({ ssl, version, versionExposed, xmlrpcOpen, loginExposed, readmeExposed, directoryListing, feedExposesVersion }) {
            const findings = [];

            // SSL checks (25 pts total)
            if (ssl) {
                if (ssl.valid) {
                    findings.push({ category: 'ssl', label: 'SSL Certificate Valid', detail: `Issued by ${ssl.issuer}`, level: 'good', points: 15, maxPoints: 15, suggestion: null });
                    if (ssl.daysLeft != null && ssl.daysLeft > 30) {
                        findings.push({ category: 'ssl', label: 'SSL Not Expiring Soon', detail: `${ssl.daysLeft} days remaining until ${ssl.validTill}`, level: 'good', points: 5, maxPoints: 5, suggestion: null });
                    } else if (ssl.daysLeft != null) {
                        findings.push({ category: 'ssl', label: 'SSL Expiring Soon', detail: `Only ${ssl.daysLeft} days left — renew before ${ssl.validTill}`, level: 'warn', points: 2, maxPoints: 5, suggestion: { text: 'Renew your SSL certificate. Most hosting providers offer auto-renewal through cPanel or Plesk. If using Let\'s Encrypt, run:', code: 'sudo certbot renew' } });
                    }
                } else {
                    findings.push({ category: 'ssl', label: 'SSL Certificate Invalid', detail: 'Certificate is expired or not trusted — visitors will see browser warnings', level: 'bad', points: 0, maxPoints: 15, suggestion: { text: 'Install a free SSL certificate via Let\'s Encrypt, or use your hosting provider\'s SSL tool (most offer one-click SSL in cPanel).', code: 'sudo certbot --apache -d yourdomain.com' } });
                    findings.push({ category: 'ssl', label: 'SSL Expired', detail: 'Renew immediately to restore secure connections', level: 'bad', points: 0, maxPoints: 5, suggestion: null });
                }
                if (ssl.hsts) {
                    findings.push({ category: 'ssl', label: 'HSTS Enabled', detail: 'Browser forced to use HTTPS — prevents downgrade attacks', level: 'good', points: 5, maxPoints: 5, suggestion: null });
                } else {
                    findings.push({ category: 'ssl', label: 'HSTS Not Enabled', detail: 'Add Strict-Transport-Security header to force HTTPS connections', level: 'warn', points: 0, maxPoints: 5, suggestion: { text: 'Add the HSTS header via your .htaccess file or use a plugin like Really Simple SSL.', code: 'Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"' } });
                }
            } else {
                findings.push({ category: 'ssl', label: 'SSL Check Failed', detail: 'Could not verify SSL certificate status', level: 'warn', points: 0, maxPoints: 25, suggestion: { text: 'Ensure your site has a valid SSL certificate installed. Contact your hosting provider or install one via Let\'s Encrypt.', code: null } });
            }

            // Version exposure (20 pts)
            if (versionExposed) {
                const sources = [];
                if (feedExposesVersion) sources.push('RSS feed');
                if (readmeExposed) sources.push('readme.html');
                findings.push({ category: 'wp', label: 'WordPress Version Exposed', detail: `Version ${version} is visible via ${sources.length ? sources.join(' and ') : 'page source'} — attackers can target known vulnerabilities`, level: 'bad', points: 0, maxPoints: 20, suggestion: { text: 'Hide your WordPress version from the page source by adding this to your theme\'s functions.php:', code: "remove_action('wp_head', 'wp_generator');\nadd_filter('the_generator', '__return_empty_string');" } });
            } else {
                findings.push({ category: 'wp', label: 'WordPress Version Hidden', detail: 'Version number is not publicly exposed — reduces targeted attack surface', level: 'good', points: 20, maxPoints: 20, suggestion: null });
            }

            // XML-RPC (20 pts)
            if (xmlrpcOpen) {
                findings.push({ category: 'wp', label: 'XML-RPC Enabled', detail: 'xmlrpc.php is accessible — commonly used for brute-force and DDoS amplification attacks. Disable if not needed.', level: 'bad', points: 0, maxPoints: 20, suggestion: { text: 'Disable XML-RPC by adding this to your theme\'s functions.php, or block it via .htaccess:', code: "// In functions.php:\nadd_filter('xmlrpc_enabled', '__return_false');\n\n// Or in .htaccess:\n<Files xmlrpc.php>\n  Order Deny,Allow\n  Deny from all\n</Files>" } });
            } else {
                findings.push({ category: 'wp', label: 'XML-RPC Disabled', detail: 'xmlrpc.php is not accessible — blocks a common attack vector', level: 'good', points: 20, maxPoints: 20, suggestion: null });
            }

            // Login page (10 pts)
            if (loginExposed) {
                findings.push({ category: 'wp', label: 'Login Page Exposed', detail: 'wp-login.php is publicly accessible — consider hiding or protecting it with rate limiting / 2FA', level: 'warn', points: 0, maxPoints: 10, suggestion: { text: 'Use a plugin like WPS Hide Login to change your login URL from the default /wp-login.php to a custom path. Also consider adding two-factor authentication.', code: null } });
            } else {
                findings.push({ category: 'wp', label: 'Login Page Hidden', detail: 'wp-login.php is not directly accessible — reduces brute-force attack surface', level: 'good', points: 10, maxPoints: 10, suggestion: null });
            }

            // readme.html (10 pts)
            if (readmeExposed) {
                findings.push({ category: 'wp', label: 'readme.html Exposed', detail: 'WordPress readme.html is publicly accessible and may reveal version information', level: 'warn', points: 0, maxPoints: 10, suggestion: { text: 'Delete the readme.html file from your WordPress root directory. It gets recreated on updates, so add a post-update script or use .htaccess to block access:', code: '<Files readme.html>\n  Order Deny,Allow\n  Deny from all\n</Files>' } });
            } else {
                findings.push({ category: 'wp', label: 'readme.html Hidden', detail: 'WordPress readme.html is not publicly accessible', level: 'good', points: 10, maxPoints: 10, suggestion: null });
            }

            // Directory listing (15 pts)
            if (directoryListing) {
                findings.push({ category: 'wp', label: 'Directory Listing Enabled', detail: 'wp-content/ shows file listing — exposes internal structure, plugin/theme files to attackers', level: 'bad', points: 0, maxPoints: 15, suggestion: { text: 'Disable directory browsing by adding this line to your .htaccess file:', code: 'Options -Indexes' } });
            } else {
                findings.push({ category: 'wp', label: 'Directory Listing Disabled', detail: 'Server does not expose directory contents — internal file structure is hidden', level: 'good', points: 15, maxPoints: 15, suggestion: null });
            }

            const totalMax = findings.reduce((s, f) => s + f.maxPoints, 0);
            const totalPts = findings.reduce((s, f) => s + f.points, 0);
            const score = totalMax > 0 ? Math.round((totalPts / totalMax) * 100) : null;

            return { score, findings, isWordPress: false };
        }

        // --- Page builder detection ---
        function detectPageBuilder(html) {
            // Check HTML signatures for known page builders
            if (/class=["'][^"']*elementor/i.test(html) || /data-elementor/i.test(html) || /\/elementor\//i.test(html)) return 'Elementor';
            if (/class=["'][^"']*et_pb_/i.test(html) || /class=["'][^"']*et_builder/i.test(html) || /\/et-builder\//i.test(html) || /\/Divi\//i.test(html)) return 'Divi Builder';
            if (/class=["'][^"']*fl-builder/i.test(html) || /class=["'][^"']*fl-row/i.test(html) || /\/bb-plugin\//i.test(html)) return 'Beaver Builder';
            if (/class=["'][^"']*brz-/i.test(html) || /\/brizy\//i.test(html)) return 'Brizy';
            if (/class=["'][^"']*vc_row/i.test(html) || /class=["'][^"']*wpb_/i.test(html) || /js_composer/i.test(html) || /\/visual-composer/i.test(html)) return 'WPBakery Page Builder';
            if (/class=["'][^"']*ct-section/i.test(html) || /\/oxygen\//i.test(html) || /oxy-/i.test(html)) return 'Oxygen Builder';
            if (/class=["'][^"']*siteorigin-panels/i.test(html) || /\/siteorigin-panels\//i.test(html)) return 'SiteOrigin Page Builder';
            if (/class=["'][^"']*fusion-/i.test(html) || /\/fusion-builder\//i.test(html) || /class=["'][^"']*avada-/i.test(html)) return 'Avada (Fusion Builder)';
            if (/class=["'][^"']*thrive/i.test(html) || /\/thrive-visual-editor\//i.test(html)) return 'Thrive Architect';
            if (/data-bricks/i.test(html) || /class=["'][^"']*bricks-/i.test(html) || /\/bricks\//i.test(html)) return 'Bricks Builder';
            if (/class=["'][^"']*sp-page-builder/i.test(html) || /\/sp-page-builder\//i.test(html)) return 'SP Page Builder';
            if (/class=["'][^"']*zion/i.test(html) || /\/zionbuilder\//i.test(html)) return 'Zion Builder';
            if (/\/generateblocks\//i.test(html) || /class=["'][^"']*gb-container/i.test(html)) return 'GenerateBlocks';
            if (/class=["'][^"']*kadence-/i.test(html) || /\/kadence-blocks\//i.test(html)) return 'Kadence Blocks';
            if (/class=["'][^"']*spectra-/i.test(html) || /\/spectra\//i.test(html) || /\/ultimate-addons-for-gutenberg\//i.test(html)) return 'Spectra (UAG)';
            if (/class=["'][^"']*stackable-/i.test(html) || /\/stackable\//i.test(html)) return 'Stackable';
            if (/class=["'][^"']*wp-block-/i.test(html) && !/elementor|fl-builder|vc_row|et_pb_/i.test(html)) return 'Gutenberg (Block Editor)';
            return null;
        }

        // Extract plugins from additional sources (REST API namespaces, HTML patterns)
        function extractPluginsFromHtml(html) {
            const plugins = new Set();
            // Standard wp-content/plugins path
            const pluginMatches = html.matchAll(/\/wp-content\/plugins\/([a-z0-9_-]+)\//gi);
            for (const m of pluginMatches) plugins.add(m[1]);
            // Detect plugins from inline script handles/IDs
            const scriptHandles = html.matchAll(/id=["']([a-z0-9_-]+?)(?:-js|-css)(?:-extra)?["']/gi);
            const knownHandles = {
                'wpcf7': 'contact-form-7', 'jetpack': 'jetpack', 'akismet': 'akismet',
                'wc-': 'woocommerce', 'woocommerce': 'woocommerce', 'elementor': 'elementor',
                'wpforms': 'wpforms-lite', 'monsterinsights': 'monsterinsights',
                'yoast': 'wordpress-seo', 'rank-math': 'seo-by-rank-math',
                'mailchimp': 'mailchimp-for-wp', 'tablepress': 'tablepress',
                'wordfence': 'wordfence', 'sucuri': 'sucuri-scanner',
                'cookie-notice': 'cookie-notice', 'cookie-law': 'cookie-law-info',
                'complianz': 'complianz-gdpr', 'iubenda': 'iubenda-cookie-law-solution',
                'polylang': 'polylang', 'translatepress': 'translatepress-multilingual',
                'nextgen': 'nextgen-gallery', 'envira': 'envira-gallery-lite',
                'modula': 'modula-best-grid-gallery', 'smart-slider': 'smart-slider-3',
                'buddypress': 'buddypress', 'bbpress': 'bbpress',
                'edd': 'easy-digital-downloads', 'popup-maker': 'popup-maker',
                'optinmonster': 'optinmonster', 'sumo': 'sumo',
                'addtoany': 'addtoany', 'shareaholic': 'shareaholic',
            };
            for (const m of scriptHandles) {
                const handle = m[1].toLowerCase();
                for (const [prefix, slug] of Object.entries(knownHandles)) {
                    if (handle.startsWith(prefix)) { plugins.add(slug); break; }
                }
            }
            // Detect from common class names / data attributes
            if (/class=["'][^"']*elementor/i.test(html)) plugins.add('elementor');
            if (/class=["'][^"']*woocommerce/i.test(html) || /class=["'][^"']*wc-/i.test(html)) plugins.add('woocommerce');
            if (/class=["'][^"']*wpforms/i.test(html)) plugins.add('wpforms-lite');
            if (/class=["'][^"']*jetpack/i.test(html)) plugins.add('jetpack');
            if (/data-cfasync/i.test(html) || /class=["'][^"']*wpcf7/i.test(html)) plugins.add('contact-form-7');
            if (/class=["'][^"']*bb-/i.test(html) || /fl-builder/i.test(html)) plugins.add('beaver-builder-lite-version');
            if (/class=["'][^"']*brizy/i.test(html)) plugins.add('brizy');
            if (/class=["'][^"']*sp-starter/i.test(html) || /starter-templates/i.test(html)) plugins.add('starter-templates');
            return plugins;
        }

        function extractPluginsFromApi(apiJson) {
            const plugins = new Set();
            try {
                const data = typeof apiJson === 'string' ? JSON.parse(apiJson) : apiJson;
                if (data && data.namespaces && Array.isArray(data.namespaces)) {
                    const nsMap = {
                        'wc/': 'woocommerce', 'jetpack/': 'jetpack', 'yoast/': 'wordpress-seo',
                        'contact-form-7/': 'contact-form-7', 'elementor/': 'elementor',
                        'akismet/': 'akismet', 'wordfence/': 'wordfence',
                        'wp-mail-smtp/': 'wp-mail-smtp', 'wpforms/': 'wpforms-lite',
                        'monsterinsights/': 'monsterinsights', 'rank-math/': 'seo-by-rank-math',
                        'redirection/': 'redirection', 'updraftplus/': 'updraftplus',
                        'buddypress/': 'buddypress', 'bbpress/': 'bbpress',
                        'edd/': 'easy-digital-downloads', 'lmfwc/': 'license-manager-for-woocommerce',
                        'surecart/': 'surecart', 'site-kit/': 'google-site-kit',
                    };
                    for (const ns of data.namespaces) {
                        for (const [prefix, slug] of Object.entries(nsMap)) {
                            if (ns.startsWith(prefix)) plugins.add(slug);
                        }
                    }
                }
            } catch { /* ignore */ }
            return plugins;
        }

        // --- Core detection logic (shared by single & bulk) ---
        async function detectWordPress(urlString) {
            const baseUrl = normalizeUrl(urlString);
            const checks = {};
            let version = null;
            let theme = null;
            let plugins = new Set();

            // Start SSL check in parallel with main fetch
            const domain = baseUrl.hostname;
            const sslPromise = checkSSL(domain);

            const html = await fetchText(baseUrl.origin);

            // 1. Meta generator tag
            const generatorMatch = html.match(/<meta[^>]+name=["']generator["'][^>]+content=["']([^"']*wordpress[^"']*)["']/i)
                || html.match(/<meta[^>]+content=["']([^"']*wordpress[^"']*)["'][^>]+name=["']generator["']/i);
            checks['Meta Generator Tag'] = !!generatorMatch;
            if (generatorMatch) {
                const vMatch = generatorMatch[1].match(/wordpress\s*\.?\s*([\d.]+)/i);
                if (vMatch) version = vMatch[1];
            }

            // 2. wp-content / wp-includes
            checks['wp-content/wp-includes Paths'] = /\/wp-content\//i.test(html) || /\/wp-includes\//i.test(html);

            // 3. wp-emoji / wp-embed scripts
            checks['WordPress Scripts (emoji/embed)'] = /wp-emoji-release/i.test(html) || /wp-embed\.min\.js/i.test(html);

            // 4. Theme detection
            const themeMatches = html.matchAll(/\/wp-content\/themes\/([a-z0-9_-]+)\//gi);
            const themes = new Set();
            for (const m of themeMatches) themes.add(m[1]);
            if (themes.size > 0) theme = [...themes][0];
            checks['Theme Detected'] = themes.size > 0;

            // 5. Page builder detection
            const pageBuilder = detectPageBuilder(html);

            // 6. Plugin detection — extract from HTML + scripts + classes
            const htmlPlugins = extractPluginsFromHtml(html);
            for (const p of htmlPlugins) plugins.add(p);

            // Run all endpoint checks in parallel (including security-relevant ones)
            const [loginResult, apiResult, xmlrpcResult, feedResult, readmeResult, dirListResult] = await Promise.allSettled([
                proxyFetch(baseUrl.origin + '/wp-login.php')
                    .then(r => r.text())
                    .then(t => /user_login/i.test(t) && /wp-submit/i.test(t)),

                fetchText(baseUrl.origin + '/wp-json/')
                    .then(t => { return t; }),

                proxyFetch(baseUrl.origin + '/xmlrpc.php')
                    .then(r => r.text())
                    .then(t => /xml-rpc server accepts post requests only/i.test(t)),

                fetchText(baseUrl.origin + '/feed/')
                    .then(t => { const m = t.match(/generator>https?:\/\/wordpress\.org\/\?v=([\d.]+)</i); return m ? m[1] : null; }),

                fetchText(baseUrl.origin + '/readme.html')
                    .then(t => {
                        const m = t.match(/wordpress[^<]*?version\s*([\d.]+)/i) || t.match(/<br\s*\/?\s*>\s*version\s*([\d.]+)/i);
                        return m ? m[1] : null;
                    }),

                fetchText(baseUrl.origin + '/wp-content/')
                    .then(t => /index of/i.test(t) || /<title>[^<]*directory/i.test(t))
            ]);

            checks['wp-login.php'] = loginResult.status === 'fulfilled' && loginResult.value;

            // Extract plugins from REST API namespaces
            let apiText = null;
            if (apiResult.status === 'fulfilled') {
                apiText = apiResult.value;
                try { const d = JSON.parse(apiText); checks['REST API (/wp-json/)'] = !!(d && (d.name || d.namespaces)); } catch { checks['REST API (/wp-json/)'] = false; }
                const apiPlugins = extractPluginsFromApi(apiText);
                for (const p of apiPlugins) plugins.add(p);
            } else {
                checks['REST API (/wp-json/)'] = false;
            }

            checks['XML-RPC'] = xmlrpcResult.status === 'fulfilled' && xmlrpcResult.value;

            const feedExposesVersion = feedResult.status === 'fulfilled' && feedResult.value;
            const readmeExposed = readmeResult.status === 'fulfilled' && readmeResult.value;
            const directoryListing = dirListResult.status === 'fulfilled' && dirListResult.value;

            if (!version && feedExposesVersion) version = feedResult.value;
            if (!version && readmeExposed) version = readmeResult.value;

            checks['Plugins Detected'] = plugins.size > 0;

            // Build security data
            const security = buildSecurityData({
                ssl, isWordPress: null, // computed below
                version, versionExposed: !!version,
                xmlrpcOpen: checks['XML-RPC'],
                loginExposed: checks['wp-login.php'],
                readmeExposed: !!readmeExposed,
                directoryListing: !!directoryListing,
                feedExposesVersion: !!feedExposesVersion
            });

            const passed = Object.values(checks).filter(Boolean).length;
            const total = Object.keys(checks).length;
            const strongSignals = [
                checks['Meta Generator Tag'],
                checks['wp-content/wp-includes Paths'],
                checks['WordPress Scripts (emoji/embed)'],
                checks['Theme Detected'],
                checks['REST API (/wp-json/)']
            ].filter(Boolean).length;
            const isWordPress = (strongSignals >= 1 && passed >= 2) || passed >= 3;
            const confidence = Math.round((passed / total) * 100);

            // Await SSL result
            const ssl = await sslPromise;

            // Update security with final isWordPress
            security.isWordPress = isWordPress;
            if (!isWordPress) {
                // For non-WP sites, only show SSL-related findings
                security.findings = security.findings.filter(f => f.category === 'ssl');
                security.score = security.findings.length > 0 ? Math.round(security.findings.reduce((s, f) => s + f.points, 0) / security.findings.reduce((s, f) => s + f.maxPoints, 0) * 100) : null;
            }

            return {
                url: baseUrl.origin,
                isWordPress,
                confidence,
                checks,
                version,
                theme,
                pageBuilder,
                plugins: [...plugins],
                ssl,
                security
            };
        }

        // --- Live detection (single scan with real-time check updates) ---
        async function detectWordPressLive(urlString) {
            const baseUrl = normalizeUrl(urlString);
            const checks = {};
            let version = null;
            let theme = null;
            let plugins = new Set();

            const domain = baseUrl.hostname;
            const sslPromise = checkSSL(domain);

            const html = await fetchText(baseUrl.origin);

            // HTML-based checks — resolve immediately
            const generatorMatch = html.match(/<meta[^>]+name=["']generator["'][^>]+content=["']([^"']*wordpress[^"']*)["']/i)
                || html.match(/<meta[^>]+content=["']([^"']*wordpress[^"']*)["'][^>]+name=["']generator["']/i);
            checks['Meta Generator Tag'] = !!generatorMatch;
            if (generatorMatch) {
                const vMatch = generatorMatch[1].match(/wordpress\s*\.?\s*([\d.]+)/i);
                if (vMatch) version = vMatch[1];
            }

            checks['wp-content/wp-includes Paths'] = /\/wp-content\//i.test(html) || /\/wp-includes\//i.test(html);

            checks['WordPress Scripts (emoji/embed)'] = /wp-emoji-release/i.test(html) || /wp-embed\.min\.js/i.test(html);

            const themeMatches = html.matchAll(/\/wp-content\/themes\/([a-z0-9_-]+)\//gi);
            const themes = new Set();
            for (const m of themeMatches) themes.add(m[1]);
            if (themes.size > 0) theme = [...themes][0];
            checks['Theme Detected'] = themes.size > 0;

            // Page builder detection
            const pageBuilder = detectPageBuilder(html);

            // Extract plugins from HTML + scripts + classes
            const htmlPlugins = extractPluginsFromHtml(html);
            for (const p of htmlPlugins) plugins.add(p);
            checks['Plugins Detected'] = plugins.size > 0;

            // Endpoint checks — resolve as they complete
            const endpointChecks = [
                { name: 'wp-login.php', promise: proxyFetch(baseUrl.origin + '/wp-login.php').then(r => r.text()).then(t => /user_login/i.test(t) && /wp-submit/i.test(t)) },
                { name: 'REST API (/wp-json/)', promise: fetchText(baseUrl.origin + '/wp-json/') },
                { name: 'XML-RPC', promise: proxyFetch(baseUrl.origin + '/xmlrpc.php').then(r => r.text()).then(t => /xml-rpc server accepts post requests only/i.test(t)) }
            ];

            // Feed & readme for version, directory listing for security
            const feedPromise = fetchText(baseUrl.origin + '/feed/').then(t => { const m = t.match(/generator>https?:\/\/wordpress\.org\/\?v=([\d.]+)</i); return m ? m[1] : null; }).catch(() => null);
            const readmePromise = fetchText(baseUrl.origin + '/readme.html').then(t => { const m = t.match(/wordpress[^<]*?version\s*([\d.]+)/i) || t.match(/<br\s*\/?\s*>\s*version\s*([\d.]+)/i); return m ? m[1] : null; }).catch(() => null);
            const dirListPromise = fetchText(baseUrl.origin + '/wp-content/').then(t => /index of/i.test(t) || /<title>[^<]*directory/i.test(t)).catch(() => false);

            // Fire endpoint checks
            await Promise.allSettled(endpointChecks.map(async (ec) => {
                try {
                    const val = await ec.promise;
                    if (ec.name === 'REST API (/wp-json/)') {
                        try {
                            const d = JSON.parse(val);
                            checks[ec.name] = !!(d && (d.name || d.namespaces));
                            const apiPlugins = extractPluginsFromApi(val);
                            for (const p of apiPlugins) plugins.add(p);
                        } catch { checks[ec.name] = false; }
                    } else {
                        checks[ec.name] = !!val;
                    }
                } catch {
                    checks[ec.name] = false;
                }
            }));

            const feedExposesVersion = await feedPromise;
            const readmeExposed = await readmePromise;
            const directoryListing = await dirListPromise;

            if (!version && feedExposesVersion) version = feedExposesVersion;
            if (!version && readmeExposed) version = readmeExposed;

            const passed = Object.values(checks).filter(Boolean).length;
            const total = Object.keys(checks).length;
            const strongSignals = [
                checks['Meta Generator Tag'],
                checks['wp-content/wp-includes Paths'],
                checks['WordPress Scripts (emoji/embed)'],
                checks['Theme Detected'],
                checks['REST API (/wp-json/)']
            ].filter(Boolean).length;
            const isWordPress = (strongSignals >= 1 && passed >= 2) || passed >= 3;
            const confidence = Math.round((passed / total) * 100);

            const ssl = await sslPromise;

            const security = buildSecurityData({
                ssl, version, versionExposed: !!version,
                xmlrpcOpen: checks['XML-RPC'],
                loginExposed: checks['wp-login.php'],
                readmeExposed: !!readmeExposed,
                directoryListing: !!directoryListing,
                feedExposesVersion: !!feedExposesVersion
            });
            security.isWordPress = isWordPress;
            if (!isWordPress) {
                security.findings = security.findings.filter(f => f.category === 'ssl');
                security.score = security.findings.length > 0 ? Math.round(security.findings.reduce((s, f) => s + f.points, 0) / security.findings.reduce((s, f) => s + f.maxPoints, 0) * 100) : null;
            }

            return { url: baseUrl.origin, isWordPress, confidence, checks, version, theme, pageBuilder, plugins: [...plugins], ssl, security };
        }

        // --- Share results ---
        let lastScanResult = null;

        function shareResults() {
            if (!lastScanResult) return;
            const r = lastScanResult;
            const status = r.isWordPress ? 'WordPress Detected' : 'Not WordPress';
            const lines = [`${r.url} - ${status}`];
            if (r.version) lines.push(`Version: ${r.version}`);
            if (r.theme) lines.push(`Theme: ${r.theme}`);
            if (r.pageBuilder) lines.push(`Page Builder: ${r.pageBuilder}`);
            if (r.plugins && r.plugins.length > 0) lines.push(`Plugins: ${r.plugins.join(', ')}`);
            if (r.ssl) {
                const sslStatus = r.ssl.valid ? 'Valid' : 'Expired';
                lines.push(`SSL: ${sslStatus} (${r.ssl.issuer}${r.ssl.validTill ? ', expires ' + r.ssl.validTill : ''})`);
            }
            if (r.security && r.security.score != null) {
                lines.push(`Security Score: ${r.security.score}/100`);
            }
            lines.push(`Confidence: ${r.confidence}%`);
            lines.push('');
            lines.push('Scanned with WP Inspector');

            const text = lines.join('\n');

            if (navigator.share) {
                navigator.share({ title: 'WP Inspector Result', text }).catch(() => {
                    copyToClipboard(text);
                });
            } else {
                copyToClipboard(text);
            }
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast('Results copied to clipboard');
            }).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showToast('Results copied to clipboard');
            });
        }

        // --- Scan history ---
        function saveToHistory(result) {
            if (result.error) return; // Don't save errors to history
            const history = JSON.parse(localStorage.getItem('wp-detector-history') || '[]');
            history.unshift({
                url: result.url,
                isWordPress: result.isWordPress,
                confidence: result.confidence,
                version: result.version,
                theme: result.theme,
                pageBuilder: result.pageBuilder || null,
                plugins: result.plugins || [],
                checks: result.checks || {},
                ssl: result.ssl || null,
                security: result.security || null,
                timestamp: Date.now()
            });
            // Keep last 50 entries
            if (history.length > 50) history.length = 50;
            localStorage.setItem('wp-detector-history', JSON.stringify(history));
        }

        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('wp-detector-history') || '[]');
            const container = document.getElementById('historyList');

            if (history.length === 0) {
                container.innerHTML = '<div class="history-empty">No scans yet. Your scan results will appear here.</div>';
                return;
            }

            container.innerHTML = history.map((item, i) => {
                const date = new Date(item.timestamp);
                const timeStr = date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const badge = item.isWordPress ? 'wp' : 'not-wp';
                const badgeText = item.isWordPress ? 'WP' : 'Not WP';
                const version = item.isWordPress && item.version ? ` v${item.version}` : '';

                return `<div class="history-item" onclick="showFromHistory(${i})">
                    <span class="history-url">${item.url}</span>
                    <div class="history-meta">
                        <span class="history-time">${timeStr}</span>
                        <span class="history-badge ${badge}">${badgeText}${version}</span>
                    </div>
                </div>`;
            }).join('');
        }

        function showFromHistory(index) {
            const history = JSON.parse(localStorage.getItem('wp-detector-history') || '[]');
            const item = history[index];
            if (!item) return;

            document.getElementById('urlInput').value = item.url;
            switchTab('single');

            // Show saved results directly without re-scanning
            if (item.checks && Object.keys(item.checks).length > 0) {
                lastScanResult = item;
                displayResults(item.isWordPress, item.confidence, item.checks, item.version, item.theme, item.pageBuilder || null, item.plugins || [], null, item.ssl || null, item.security || null);
                if (item.isWordPress) {
                    fetchPageSpeed(item.url).then(psi => renderPageSpeed(psi));
                }
            } else {
                // Old history entry without checks — re-scan
                scan();
            }
        }

        function clearHistory() {
            localStorage.removeItem('wp-detector-history');
            renderHistory();
            showToast('History cleared');
        }

        // --- URL validation ---
        function validateUrlInput() {
            const input = document.getElementById('urlInput').value.trim();
            const warning = document.getElementById('urlWarning');
            if (!input) { warning.classList.remove('active'); return; }

            let msg = '';
            if (/\s/.test(input)) {
                msg = 'URL contains spaces — this is likely invalid.';
            } else if (!/\./.test(input.replace(/^https?:\/\//, ''))) {
                msg = 'URL is missing a domain extension (e.g. .com, .org).';
            } else if (/[^a-z0-9.:\/\-_~?#\[\]@!$&'()*+,;=%]/i.test(input)) {
                msg = 'URL contains unusual characters — double-check it.';
            }

            if (msg) {
                warning.textContent = msg;
                warning.classList.add('active');
            } else {
                warning.classList.remove('active');
            }
        }

        // --- Single scan ---
        function setLoading(text) {
            document.getElementById('loadingText').textContent = text;
        }

        // All check names used by detectWordPress, in order
        function toggleAccordion(id) {
            document.getElementById(id).classList.toggle('open');
        }

        function showLiveChecks() {
            const results = document.getElementById('results');
            const verdict = document.getElementById('verdict');
            const verdictText = document.getElementById('verdictText');
            const confidenceText = document.getElementById('confidenceText');

            // Reset accordions
            document.getElementById('accordionOverview').style.display = 'none';
            document.getElementById('accordionSsl').style.display = 'none';
            document.getElementById('accordionPagespeed').style.display = 'none';
            document.getElementById('accordionSecurity').style.display = 'none';
            document.getElementById('shareBtn').classList.remove('active');

            verdict.className = 'verdict';
            verdictText.textContent = 'Scanning...';
            verdictText.style.color = 'var(--text-muted)';
            confidenceText.textContent = '';

            results.classList.add('active');
        }

        async function scan() {
            const input = document.getElementById('urlInput').value;
            if (!input.trim()) return;

            // Validate first
            const trimmed = input.trim();
            if (/\s/.test(trimmed)) {
                showError('errorMsg', 'URL contains spaces. Please enter a valid URL.');
                return;
            }
            try { normalizeUrl(trimmed); } catch {
                showError('errorMsg', 'Invalid URL format. Please enter a valid website address.');
                return;
            }

            const btn = document.getElementById('scanBtn');
            const loading = document.getElementById('loading');
            const errorMsg = document.getElementById('errorMsg');

            btn.disabled = true;
            loading.classList.add('active');
            errorMsg.classList.remove('active');
            document.getElementById('urlWarning').classList.remove('active');

            // Show live checks immediately
            showLiveChecks();

            const startTime = Date.now();
            let timerInterval = setInterval(() => {
                const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
                setLoading(`Scanning... ${elapsed}s`);
            }, 100);

            try {
                const result = await detectWordPressLive(trimmed);
                const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
                result.scanTime = elapsed;
                saveToHistory(result);
                lastScanResult = result;
                displayResults(result.isWordPress, result.confidence, result.checks, result.version, result.theme, result.pageBuilder, result.plugins, elapsed, result.ssl, result.security);

                // Fetch PageSpeed in background for WordPress sites
                if (result.isWordPress) {
                    fetchPageSpeed(result.url).then(psi => renderPageSpeed(psi));
                }
            } catch (err) {
                document.getElementById('results').classList.remove('active');
                showError('errorMsg', 'Could not fetch the website. Make sure the URL is correct and the site is accessible.');
            }

            clearInterval(timerInterval);
            btn.disabled = false;
            loading.classList.remove('active');
        }

        function toggleSuggestions() {
            const btn = document.getElementById('suggestionsToggle');
            const container = document.getElementById('securitySuggestions');
            const isOpen = container.classList.contains('active');
            if (isOpen) {
                container.classList.remove('active');
                btn.classList.remove('open');
                btn.textContent = 'How to Improve Your Score';
            } else {
                container.classList.add('active');
                btn.classList.add('open');
                btn.textContent = 'Hide Suggestions';
            }
        }

        function showError(id, msg) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.classList.add('active');
        }

        function displayResults(isWordPress, confidence, checks, version, theme, pageBuilder, plugins, scanTime, ssl, security) {
            const results = document.getElementById('results');
            const verdict = document.getElementById('verdict');
            const verdictText = document.getElementById('verdictText');
            const confidenceText = document.getElementById('confidenceText');

            verdict.className = 'verdict ' + (isWordPress ? 'is-wp' : 'not-wp');
            verdictText.textContent = isWordPress ? 'WordPress Detected' : 'Not WordPress';
            confidenceText.textContent = `${Object.values(checks).filter(Boolean).length}/${Object.keys(checks).length} checks passed${scanTime ? ' \u00B7 ' + scanTime + 's' : ''}`;

            // --- General Overview accordion ---
            const accordionOverview = document.getElementById('accordionOverview');
            const overviewBadge = document.getElementById('overviewBadge');
            const infoRows = document.getElementById('infoRows');
            const pluginsSection = document.getElementById('pluginsSection');
            const pluginsList = document.getElementById('pluginsList');
            infoRows.innerHTML = '';
            pluginsList.innerHTML = '';

            const hasInfo = version || theme || pageBuilder;
            const hasPlugins = plugins.length > 0;

            if (hasInfo || hasPlugins) {
                accordionOverview.style.display = 'block';
                accordionOverview.classList.add('open');
                const parts = [];
                if (version) parts.push('v' + version);
                if (theme) parts.push(theme);
                if (pageBuilder) parts.push(pageBuilder);
                overviewBadge.textContent = parts.length > 0 ? parts.join(' · ') : (hasPlugins ? plugins.length + ' plugins' : '');
                overviewBadge.className = 'accordion-badge blue';

                if (version) infoRows.innerHTML += `<div class="detail-row"><span class="label">WordPress Version</span><span class="value">${version}</span></div>`;
                if (theme) infoRows.innerHTML += `<div class="detail-row"><span class="label">Active Theme</span><span class="value">${theme}</span></div>`;
                if (pageBuilder) infoRows.innerHTML += `<div class="detail-row"><span class="label">Page Builder</span><span class="value">${pageBuilder}</span></div>`;

                if (hasPlugins) {
                    pluginsSection.style.display = 'block';
                    plugins.forEach(p => { pluginsList.innerHTML += `<span class="plugin-tag">${p}</span>`; });
                } else {
                    pluginsSection.style.display = 'none';
                }
            } else {
                accordionOverview.style.display = 'none';
            }

            // --- SSL / Domain accordion ---
            const accordionSsl = document.getElementById('accordionSsl');
            const sslBadge = document.getElementById('sslBadge');
            const sslRows = document.getElementById('sslRows');
            sslRows.innerHTML = '';
            if (isWordPress && ssl) {
                accordionSsl.style.display = 'block';
                const statusClass = ssl.valid ? (ssl.daysLeft != null && ssl.daysLeft < 30 ? 'expiring' : 'valid') : 'expired';
                const statusText = ssl.valid ? (ssl.daysLeft != null && ssl.daysLeft < 30 ? 'Expiring Soon' : 'Valid') : 'Invalid / Expired';
                const badgeColor = ssl.valid ? (ssl.daysLeft != null && ssl.daysLeft < 30 ? 'yellow' : 'green') : 'red';
                sslBadge.textContent = statusText;
                sslBadge.className = 'accordion-badge ' + badgeColor;
                sslRows.innerHTML = `
                    <div class="detail-row"><span class="label">Status</span><span class="ssl-status ${statusClass}">${statusText}</span></div>
                    <div class="detail-row"><span class="label">Issuer</span><span class="value">${ssl.issuer}</span></div>
                    ${ssl.validTill ? `<div class="detail-row"><span class="label">Expires</span><span class="value">${ssl.validTill}</span></div>` : ''}
                    ${ssl.daysLeft != null ? `<div class="detail-row"><span class="label">Days Left</span><span class="ssl-status ${statusClass}">${ssl.daysLeft} days</span></div>` : ''}
                    ${ssl.hsts ? `<div class="detail-row"><span class="label">HSTS</span><span class="value">Enabled</span></div>` : ''}
                `;
            } else {
                accordionSsl.style.display = 'none';
            }

            // --- PageSpeed accordion (WordPress only, shows loading) ---
            const accordionPagespeed = document.getElementById('accordionPagespeed');
            const psiBadge = document.getElementById('psiBadge');
            if (isWordPress) {
                accordionPagespeed.style.display = 'block';
                psiBadge.textContent = 'Loading...';
                psiBadge.className = 'accordion-badge blue';
                document.getElementById('pagespeedLoading').style.display = 'block';
                document.getElementById('pagespeedScores').style.display = 'none';
            } else {
                accordionPagespeed.style.display = 'none';
            }

            // --- Security Score accordion ---
            const accordionSecurity = document.getElementById('accordionSecurity');
            const securityBadge = document.getElementById('securityBadge');
            const securityFindings = document.getElementById('securityFindings');
            const securityGauge = document.getElementById('securityGauge');
            const suggestionsToggle = document.getElementById('suggestionsToggle');
            const securitySuggestions = document.getElementById('securitySuggestions');
            if (isWordPress && security && security.score != null && security.findings.length > 0) {
                accordionSecurity.style.display = 'block';
                const score = security.score;
                const color = score >= 70 ? '#22c55e' : score >= 40 ? '#eab308' : '#ef4444';
                const badgeColor = score >= 70 ? 'green' : score >= 40 ? 'yellow' : 'red';
                securityBadge.textContent = score + '/100';
                securityBadge.className = 'accordion-badge ' + badgeColor;
                const circumference = 2 * Math.PI * 22;
                const offset = circumference - (score / 100) * circumference;
                securityGauge.innerHTML = `
                    <svg width="56" height="56" viewBox="0 0 56 56">
                        <circle class="security-gauge-bg" cx="28" cy="28" r="22"/>
                        <circle class="security-gauge-fill" cx="28" cy="28" r="22" stroke="${color}" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"/>
                    </svg>
                    <div class="security-gauge-text" style="color:${color}">${score}</div>
                `;
                securityFindings.innerHTML = security.findings.map(f => `
                    <div class="security-finding">
                        <span class="sf-icon ${f.level}">${f.level === 'good' ? '\u2713' : f.level === 'warn' ? '!' : '\u2717'}</span>
                        <div>
                            <div style="font-weight:500;color:var(--text-bright)">${f.label}</div>
                            <div style="font-size:12px;color:var(--text-muted);margin-top:1px">${f.detail}</div>
                        </div>
                    </div>
                `).join('');

                const actionable = security.findings.filter(f => f.suggestion && (f.level === 'warn' || f.level === 'bad'));
                if (actionable.length > 0) {
                    suggestionsToggle.style.display = 'block';
                    suggestionsToggle.classList.remove('open');
                    securitySuggestions.classList.remove('active');
                    securitySuggestions.innerHTML = actionable.map(f => `
                        <div class="suggestion-card">
                            <div class="suggestion-card-header">
                                <span class="sf-icon ${f.level}">${f.level === 'warn' ? '!' : '\u2717'}</span>
                                <span class="suggestion-card-title">${f.label}</span>
                            </div>
                            <div class="suggestion-card-text">${f.suggestion.text}${f.suggestion.code ? `<code class="suggestion-code">${f.suggestion.code}</code>` : ''}</div>
                        </div>
                    `).join('');
                } else {
                    suggestionsToggle.style.display = 'none';
                    securitySuggestions.classList.remove('active');
                    securitySuggestions.innerHTML = '';
                }
            } else {
                accordionSecurity.style.display = 'none';
            }

            document.getElementById('shareBtn').classList.add('active');
            verdictText.style.color = '';
            results.classList.add('active');
        }

        // --- Bulk scan ---
        let bulkResultsData = [];

        async function bulkScan() {
            let urls = [];

            if (uploadedUrls.length > 0) {
                urls = uploadedUrls;
            } else {
                const input = document.getElementById('bulkInput').value.trim();
                if (!input) return;
                urls = input.split('\n').map(u => u.trim()).filter(u => u.length > 0);
            }

            if (urls.length === 0) return;

            const btn = document.getElementById('bulkScanBtn');
            const errorMsg = document.getElementById('bulkErrorMsg');
            const progressEl = document.getElementById('bulkProgress');
            const progressBar = document.getElementById('progressBar');
            const progressText = document.getElementById('progressText');
            const container = document.getElementById('bulkResultsContainer');
            const resultsEl = document.getElementById('bulkResults');

            btn.disabled = true;
            errorMsg.classList.remove('active');
            progressEl.classList.add('active');
            container.style.display = 'none';
            resultsEl.innerHTML = '';
            bulkResultsData = [];

            let completed = 0;
            const CONCURRENCY = 3;
            const bulkStartTime = Date.now();
            const bulkTimerInterval = setInterval(() => {
                const elapsed = ((Date.now() - bulkStartTime) / 1000).toFixed(1);
                progressText.textContent = `Scanning ${Math.min(completed + 1, urls.length)} / ${urls.length} \u2014 ${elapsed}s`;
            }, 100);

            for (let i = 0; i < urls.length; i += CONCURRENCY) {
                const batch = urls.slice(i, i + CONCURRENCY);

                progressBar.style.width = `${(completed / urls.length) * 100}%`;

                const batchResults = await Promise.allSettled(
                    batch.map(async (url) => {
                        try {
                            const result = await detectWordPress(url);
                            return result;
                        } catch {
                            return {
                                url: url,
                                isWordPress: false,
                                confidence: 0,
                                checks: {},
                                version: null,
                                theme: null,
                                plugins: [],
                                error: true
                            };
                        }
                    })
                );

                for (const settled of batchResults) {
                    const result = settled.status === 'fulfilled' ? settled.value : {
                        url: '?',
                        isWordPress: false,
                        confidence: 0,
                        checks: {},
                        version: null,
                        theme: null,
                        plugins: [],
                        error: true
                    };
                    bulkResultsData.push(result);
                    appendBulkResult(result, resultsEl);
                    saveToHistory(result);
                    completed++;
                }

                progressBar.style.width = `${(completed / urls.length) * 100}%`;

                if (i + CONCURRENCY < urls.length) await delay(1000);
            }

            clearInterval(bulkTimerInterval);

            const totalElapsed = ((Date.now() - bulkStartTime) / 1000).toFixed(1);
            progressText.textContent = `Done \u2014 ${completed} / ${urls.length} in ${totalElapsed}s`;
            btn.disabled = false;

            showBulkSummary();
            container.style.display = 'block';
        }

        function showBulkSummary() {
            const wpCount = bulkResultsData.filter(r => r.isWordPress).length;
            const notWpCount = bulkResultsData.filter(r => !r.isWordPress && !r.error).length;
            const errCount = bulkResultsData.filter(r => r.error).length;

            document.getElementById('bulkSummary').innerHTML = `
                <div class="bulk-summary-item wp" onclick="filterBulkResults('wp', this)">
                    <div class="bulk-summary-count">${wpCount}</div>
                    <div class="bulk-summary-label">WordPress</div>
                </div>
                <div class="bulk-summary-item not-wp" onclick="filterBulkResults('not-wp', this)">
                    <div class="bulk-summary-count">${notWpCount}</div>
                    <div class="bulk-summary-label">Not WordPress</div>
                </div>
                <div class="bulk-summary-item err" onclick="filterBulkResults('error', this)">
                    <div class="bulk-summary-count">${errCount}</div>
                    <div class="bulk-summary-label">Errors</div>
                </div>
            `;

            document.getElementById('retryErrorsBtn').style.display = errCount > 0 ? '' : 'none';
        }

        async function retryErrors() {
            const errorIndices = [];
            bulkResultsData.forEach((r, i) => { if (r.error) errorIndices.push(i); });

            if (errorIndices.length === 0) return;

            const btn = document.getElementById('retryErrorsBtn');
            const progressEl = document.getElementById('bulkProgress');
            const progressBar = document.getElementById('progressBar');
            const progressText = document.getElementById('progressText');

            btn.disabled = true;
            btn.textContent = 'Retrying...';
            progressEl.classList.add('active');

            let completed = 0;
            const total = errorIndices.length;
            const CONCURRENCY = 3;
            const startTime = Date.now();
            const timerInterval = setInterval(() => {
                const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
                progressText.textContent = `Retrying ${Math.min(completed + 1, total)} / ${total} errors \u2014 ${elapsed}s`;
            }, 100);


            for (let i = 0; i < errorIndices.length; i += CONCURRENCY) {
                const batch = errorIndices.slice(i, i + CONCURRENCY);

                progressBar.style.width = `${(completed / total) * 100}%`;

                const batchResults = await Promise.allSettled(
                    batch.map(async (idx) => {
                        try {
                            const result = await detectWordPress(bulkResultsData[idx].url);
                            return { idx, result };
                        } catch {
                            return { idx, result: null };
                        }
                    })
                );

                for (const settled of batchResults) {
                    if (settled.status === 'fulfilled' && settled.value.result) {
                        const { idx, result } = settled.value;
                        bulkResultsData[idx] = result;
                        saveToHistory(result);
                    }
                    completed++;
                }

                progressBar.style.width = `${(completed / total) * 100}%`;
                if (i + CONCURRENCY < errorIndices.length) await delay(1500);
            }

            clearInterval(timerInterval);

            const totalElapsed = ((Date.now() - startTime) / 1000).toFixed(1);
            progressText.textContent = `Retry done in ${totalElapsed}s`;

            // Re-render all results
            const resultsEl = document.getElementById('bulkResults');
            resultsEl.innerHTML = '';
            activeFilter = null;
            for (const result of bulkResultsData) {
                appendBulkResult(result, resultsEl);
            }

            showBulkSummary();
            btn.disabled = false;
            btn.textContent = 'Retry Errors';
        }

        function appendBulkResult(result, container) {
            const id = 'detail-' + Math.random().toString(36).slice(2, 9);
            let badgeClass, badgeText;

            if (result.error) {
                badgeClass = 'error';
                badgeText = 'Error';
            } else if (result.isWordPress) {
                badgeClass = 'wp';
                badgeText = 'WordPress';
            } else {
                badgeClass = 'not-wp';
                badgeText = 'Not WP';
            }

            const versionText = result.version ? `v${result.version}` : '';

            let detailsHtml = '';
            if (!result.error) {
                detailsHtml = `<div class="bulk-result-details" id="${id}">`;
                if (result.version) detailsHtml += `<div class="bulk-detail-row"><span>Version</span><span class="val">${result.version}</span></div>`;
                if (result.theme) detailsHtml += `<div class="bulk-detail-row"><span>Theme</span><span class="val">${result.theme}</span></div>`;
                if (result.pageBuilder) detailsHtml += `<div class="bulk-detail-row"><span>Page Builder</span><span class="val">${result.pageBuilder}</span></div>`;
                if (result.ssl) {
                    const sslClass = result.ssl.valid ? (result.ssl.daysLeft != null && result.ssl.daysLeft < 30 ? 'expiring' : 'valid') : 'expired';
                    const sslLabel = result.ssl.valid ? (result.ssl.daysLeft != null && result.ssl.daysLeft < 30 ? 'Expiring Soon' : 'Valid') : 'Expired';
                    detailsHtml += `<div class="bulk-detail-row"><span>SSL</span><span class="ssl-status ${sslClass}">${sslLabel}</span></div>`;
                    detailsHtml += `<div class="bulk-detail-row"><span>SSL Issuer</span><span class="val">${result.ssl.issuer}</span></div>`;
                    if (result.ssl.validTill) detailsHtml += `<div class="bulk-detail-row"><span>SSL Expires</span><span class="val">${result.ssl.validTill}${result.ssl.daysLeft != null ? ' (' + result.ssl.daysLeft + ' days)' : ''}</span></div>`;
                }
                if (result.security && result.security.score != null) {
                    const sc = result.security.score;
                    const scColor = sc >= 70 ? '#22c55e' : sc >= 40 ? '#eab308' : '#ef4444';
                    detailsHtml += `<div class="bulk-detail-row"><span>Security</span><span style="color:${scColor};font-weight:600">${sc}/100</span></div>`;
                }
                detailsHtml += `</div>`;
            }

            const resultType = result.error ? 'error' : (result.isWordPress ? 'wp' : 'not-wp');

            container.innerHTML += `
                <div class="bulk-result-item" data-type="${resultType}">
                    <span class="bulk-result-url" title="${result.url}">${result.url}</span>
                    <div class="bulk-result-info">
                        <span class="bulk-result-version">${versionText}</span>
                        <span class="bulk-badge ${badgeClass}">${badgeText}</span>
                        ${!result.error ? `<button class="bulk-detail-toggle" onclick="toggleDetail('${id}')">Details</button>` : ''}
                    </div>
                </div>
                ${detailsHtml ? detailsHtml.replace('class="bulk-result-details"', `class="bulk-result-details" data-type="${resultType}"`) : ''}
            `;
        }

        let activeFilter = null;

        function filterBulkResults(type, el) {
            const items = document.querySelectorAll('#bulkResults .bulk-result-item');
            const details = document.querySelectorAll('#bulkResults .bulk-result-details');
            const summaryItems = document.querySelectorAll('.bulk-summary-item');

            if (activeFilter === type) {
                activeFilter = null;
                summaryItems.forEach(s => s.classList.remove('selected'));
                items.forEach(item => item.style.display = '');
                details.forEach(d => d.style.display = '');
                return;
            }

            activeFilter = type;
            summaryItems.forEach(s => s.classList.remove('selected'));
            el.classList.add('selected');

            items.forEach(item => {
                item.style.display = item.dataset.type === type ? '' : 'none';
            });
            details.forEach(d => {
                d.style.display = d.dataset.type === type ? '' : 'none';
            });
        }

        function toggleDetail(id) {
            document.getElementById(id).classList.toggle('active');
        }

        // --- Copy results ---
        function copyResults() {
            if (bulkResultsData.length === 0) return;

            const lines = bulkResultsData.map(r => {
                const status = r.error ? 'Error' : (r.isWordPress ? 'WordPress' : 'Not WordPress');
                const version = r.version ? ` (v${r.version})` : '';
                const theme = r.theme ? ` [${r.theme}]` : '';
                return `${r.url} - ${status}${version}${theme}`;
            });

            const text = lines.join('\n');
            navigator.clipboard.writeText(text).then(() => {
                showToast('Results copied to clipboard');
            }).catch(() => {
                // Fallback
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showToast('Results copied to clipboard');
            });
        }

        function clearBulk() {
            document.getElementById('bulkInput').value = '';
            document.getElementById('bulkResults').innerHTML = '';
            document.getElementById('bulkResultsContainer').style.display = 'none';
            document.getElementById('bulkProgress').classList.remove('active');
            document.getElementById('bulkErrorMsg').classList.remove('active');
            bulkResultsData = [];
            activeFilter = null;
            clearFile();
        }

        function exportCSV() {
            if (bulkResultsData.length === 0) return;

            const rows = [['URL', 'Is WordPress', 'Version', 'Theme', 'Plugins', 'Confidence', 'Security Score']];
            for (const r of bulkResultsData) {
                rows.push([
                    r.url,
                    r.error ? 'Error' : (r.isWordPress ? 'Yes' : 'No'),
                    r.version || '',
                    r.theme || '',
                    r.plugins.join('; '),
                    r.error ? '' : r.confidence + '%',
                    r.security && r.security.score != null ? r.security.score + '/100' : ''
                ]);
            }

            const csv = rows.map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')).join('\n');
            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'wordpress-scan-results.csv';
            a.click();
            URL.revokeObjectURL(a.href);
        }

        // Enter key for single scan
        document.getElementById('urlInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') scan();
        });
    </script>
